<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Word Chain · 무한 끝말잇기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 0단계: 닉네임 화면 -->
  <div class="screen" id="nicknameScreen">
    <div class="setup-card">
      <div class="logo">
        <span class="logo-en">Infinite Word Chain</span>
        <span class="logo-ko">무한 끝말잇기</span>
      </div>

      <div class="nickname-form">
        <label class="field-label" for="displayNameInput">이름을 입력하세요</label>
        <input
          type="text"
          id="displayNameInput"
          class="name-input"
          placeholder="예: 철수"
          maxlength="10"
          autocomplete="off"
          spellcheck="false"
        >
        <div class="nickname-preview hidden" id="nicknamePreview"></div>
      </div>

      <button class="btn-start" id="nicknameConfirmBtn" disabled>다음</button>
      <div class="card-footer">
        <div class="version-tag"></div>
        <a href="/admin.html" class="admin-link">관리자</a>
      </div>
    </div>
  </div>

  <!-- 1단계: 설정 화면 -->
  <div class="screen hidden" id="setupScreen">
    <div class="setup-card">
      <div class="logo">
        <span class="logo-en">Infinite Word Chain</span>
        <span class="logo-ko">무한 끝말잇기</span>
      </div>

      <div class="settings">
        <h2 class="settings-title">게임 설정</h2>

        <label class="toggle-row">
          <span class="toggle-label">
            <span class="toggle-icon">👤</span>
            사람 이름 허용
          </span>
          <div class="toggle-wrap">
            <input type="checkbox" id="allowPersonNames" class="toggle-input">
            <span class="toggle-slider"></span>
          </div>
        </label>

        <label class="toggle-row">
          <span class="toggle-label">
            <span class="toggle-icon">🗺️</span>
            지명 허용
          </span>
          <div class="toggle-wrap">
            <input type="checkbox" id="allowPlaceNames" class="toggle-input">
            <span class="toggle-slider"></span>
          </div>
        </label>

        <div class="rules">
          <p>📌 3글자 한국어 명사만 허용</p>
          <p>📌 두음법칙 적용 가능</p>
          <p>📌 이미 사용된 단어 재사용 불가</p>
        </div>
      </div>

      <button class="btn-start" id="startBtn">게임 시작</button>
    </div>
  </div>

  <!-- 2단계: 게임 화면 -->
  <div class="screen hidden" id="gameScreen">
    <header class="game-header">
      <div class="header-left">
        <button class="btn-icon" id="settingsToggleBtn" title="설정">⚙</button>
        <span class="game-title">끝말잇기</span>
      </div>
      <div class="header-center">
        <span class="player-nickname" id="playerNicknameBadge"></span>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="rankingToggleBtn" title="랭킹">🏆</button>
        <span class="turn-badge" id="turnBadge">0턴</span>
        <button class="btn-icon btn-danger" id="resetBtn" title="재시작">↺</button>
      </div>
    </header>

    <!-- 인게임 설정 패널 -->
    <div class="ingame-settings hidden" id="ingameSettings">
      <label class="toggle-row-sm">
        <span>👤 사람 이름</span>
        <div class="toggle-wrap">
          <input type="checkbox" id="ingamePersonNames" class="toggle-input">
          <span class="toggle-slider"></span>
        </div>
      </label>
      <label class="toggle-row-sm">
        <span>🗺️ 지명</span>
        <div class="toggle-wrap">
          <input type="checkbox" id="ingamePlaceNames" class="toggle-input">
          <span class="toggle-slider"></span>
        </div>
      </label>
    </div>

    <!-- 랭킹 패널 -->
    <div class="ranking-panel hidden" id="rankingPanel">
      <div class="ranking-header">🏆 오늘의 랭킹 TOP 10</div>
      <ol class="ranking-list" id="rankingList">
        <li class="ranking-empty">기록이 없습니다</li>
      </ol>
    </div>

    <!-- 필수 시작 글자 -->
    <div class="required-bar" id="requiredBar" style="opacity:0.4">
      <span class="required-label">시작 글자</span>
      <div class="required-chars" id="requiredCharsDisplay"></div>
    </div>

    <!-- 체인 -->
    <div class="chain-container" id="chainContainer">
      <div class="chain-start-hint" id="chainStartHint">
        첫 번째 단어를 입력하세요
      </div>
    </div>

    <!-- 입력 영역 -->
    <div class="input-area" id="inputArea">
      <div class="process-log hidden" id="processLog"></div>
      <div class="error-msg hidden" id="errorMsg"></div>
      <div class="input-row">
        <input
          type="text"
          id="wordInput"
          class="word-input"
          placeholder="3글자 명사 입력..."
          maxlength="6"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
        <button class="btn-submit" id="submitBtn">입력</button>
      </div>
    </div>

    <!-- AI 로딩 -->
    <div class="ai-loading hidden" id="aiLoading">
      <div class="ai-loading-inner">
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
        <span>AI 생각 중...</span>
      </div>
    </div>
  </div>

  <!-- 단어 정보 / 이의 제기 모달 -->
  <div class="modal-overlay hidden" id="wordInfoModal">
    <div class="modal-card">
      <div class="modal-header">
        <span class="modal-word-title" id="modalWord"></span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-definitions" id="modalDefinitions"></div>
      <div class="modal-footer">
        <p class="modal-challenge-hint">이 단어가 잘못 쓰였다고 생각하나요?</p>
        <button class="btn-challenge" id="challengeBtn">이의 제기</button>
      </div>
    </div>
  </div>

  <script src="version.js"></script>
  <script src="game.js"></script>
</body>
</html>
