<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <title>Infinite Word Chain · 무한 끝말잇기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 0단계: 닉네임 화면 -->
  <div class="screen" id="nicknameScreen">
    <div class="setup-card">
      <div class="logo">
        <span class="logo-en">Infinite Word Chain</span>
        <span class="logo-ko">무한 끝말잇기</span>
      </div>

      <div class="nickname-form">
        <label class="field-label" for="displayNameInput">이름을 입력하세요</label>
        <input
          type="text"
          id="displayNameInput"
          class="name-input"
          placeholder="예: 철수"
          maxlength="10"
          autocomplete="off"
          spellcheck="false"
        >
        <div class="nickname-preview hidden" id="nicknamePreview"></div>
      </div>

      <!-- 홈 랭킹 -->
      <div class="home-ranking">
        <div class="home-ranking-header">
          <span class="home-ranking-title">🏆 전체 랭킹 TOP 10</span>
          <button class="home-ranking-refresh" id="homeRankingRefresh" title="새로고침">↻</button>
        </div>
        <div class="home-ranking-body" id="homeRankingBody">
          <div class="home-ranking-loading">불러오는 중...</div>
        </div>
      </div>

      <!-- 게임 모드 선택 -->
      <div class="mode-selector">
        <button class="btn-mode active" id="modeNormalBtn">일반 모드</button>
        <button class="btn-mode hell" id="modeHellBtn">🔥 헬 모드</button>
      </div>

      <button class="btn-start" id="nicknameConfirmBtn" disabled>게임 시작</button>
      <div class="card-footer">
        <div class="version-tag"></div>
        <div class="card-footer-links">
          <a href="/challenge.html" class="challenge-link">솔로 챌린지</a>
          <a href="/admin.html" class="admin-link">관리자</a>
          <a href="/admin.html#word-input" class="admin-link">단어 입력</a>
        </div>
      </div>
    </div>
  </div>

  <!-- 게임 화면 -->
  <div class="screen hidden" id="gameScreen">
    <header class="game-header">
      <div class="header-left">
        <a href="/" class="btn-icon" title="홈">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <span class="game-title">끝말잇기</span>
      </div>
      <div class="header-center">
        <span class="player-nickname" id="playerNicknameBadge"></span>
      </div>
      <div class="header-right">
        <span class="hell-badge hidden" id="hellBadge">🔥 헬</span>
        <span class="turn-badge" id="turnBadge">0턴</span>
        <button class="btn-icon btn-danger" id="resetBtn" title="재시작">↺</button>
      </div>
    </header>

    <!-- 필수 시작 글자 -->
    <div class="required-bar" id="requiredBar" style="opacity:0.4">
      <span class="required-label">시작 글자</span>
      <div class="required-chars" id="requiredCharsDisplay"></div>
    </div>

    <!-- 체인 -->
    <div class="chain-container" id="chainContainer">
      <div class="chain-start-hint" id="chainStartHint">
        AI가 먼저 시작합니다...
      </div>
    </div>

    <!-- 입력 영역 -->
    <div class="input-area" id="inputArea">
      <div class="process-log hidden" id="processLog"></div>
      <div class="error-msg hidden" id="errorMsg"></div>
      <div class="input-row">
        <button class="btn-surrender" id="surrenderBtn">포기</button>
        <input
          type="text"
          id="wordInput"
          class="word-input"
          placeholder="3글자 명사 입력..."
          maxlength="6"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
        <button class="btn-submit" id="submitBtn">입력</button>
      </div>
    </div>

    <!-- AI 로딩 -->
    <div class="ai-loading hidden" id="aiLoading">
      <div class="ai-loading-inner">
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
        <span>AI 생각 중...</span>
      </div>
    </div>
  </div>

  <!-- 단어 정보 / 이의 제기 모달 -->
  <div class="modal-overlay hidden" id="wordInfoModal">
    <div class="modal-card">
      <div class="modal-header">
        <span class="modal-word-title" id="modalWord"></span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-definitions" id="modalDefinitions"></div>
      <div class="modal-footer">
        <p class="modal-challenge-hint">이 단어가 잘못 쓰였다고 생각하나요?</p>
        <button class="btn-challenge" id="challengeBtn">이의 제기</button>
      </div>
    </div>
  </div>

  <!-- 포기 확인 모달 -->
  <div class="surrender-overlay hidden" id="surrenderModal">
    <div class="surrender-card">
      <p class="surrender-msg">이대로 포기하겠습니까?</p>
      <div class="surrender-actions">
        <button class="btn-surrender-cancel" id="surrenderCancelBtn">취소</button>
        <button class="btn-surrender-confirm" id="surrenderConfirmBtn">포기</button>
      </div>
    </div>
  </div>

  <script src="version.js"></script>
  <script src="game.js"></script>
</body>
</html>
