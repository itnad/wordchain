<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 · 끝말잇기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111318; --card: #1c1e28; --panel: #242838;
      --border: #2e3248; --text: #eeeef3; --dim: #8690aa;
      --accent: #4f85ff; --error: #f87171; --warn: #fbbf24;
      --radius: 10px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }
    h1 { font-size: 1.3rem; font-weight: 800; padding: 20px; border-bottom: 1px solid var(--border); background: var(--card); overflow: hidden; }
    h1 span { font-size: 0.9rem; font-weight: 400; color: var(--dim); margin-left: 12px; }
    .btn-home { float: right; font-size: 0.8rem; font-weight: 600; color: var(--dim); text-decoration: none; padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; transition: color 0.15s, border-color 0.15s; display: flex; align-items: center; }
    .btn-home:hover { color: var(--accent); border-color: var(--accent); }

    /* Login */
    #loginSection { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
    .login-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 320px; display: flex; flex-direction: column; gap: 16px; }
    .login-box h2 { font-size: 1rem; color: var(--dim); text-align: center; }
    .login-box input { width: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 1rem; padding: 10px 14px; outline: none; }
    .login-box input:focus { border-color: var(--accent); }
    .btn-login { width: 100%; padding: 12px; background: var(--accent); color: #fff; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
    .error-text { color: var(--error); font-size: 0.85rem; text-align: center; }

    /* Main */
    #mainSection { display: none; }
    .toolbar { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--card); flex-wrap: wrap; }
    .toolbar-title { font-weight: 700; font-size: 1rem; }
    .toolbar-sub { color: var(--dim); font-size: 0.85rem; }
    .btn-refresh { padding: 6px 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; color: var(--text); cursor: pointer; font-size: 0.85rem; }
    .btn-refresh:hover { border-color: var(--accent); }

    /* Table */
    .table-wrap { overflow-x: auto; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--panel); color: var(--dim); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
    td { padding: 10px 14px; border-bottom: 1px solid rgba(46,50,72,0.5); vertical-align: middle; }
    tr:hover td { background: rgba(36,40,56,0.5); }

    .word-cell { font-size: 1.1rem; font-weight: 700; letter-spacing: 1px; }
    .count-cell { font-weight: 700; color: var(--warn); }
    .date-cell  { color: var(--dim); font-size: 0.8rem; }
    .status-cell { font-size: 0.8rem; }
    .status-none     { color: var(--dim); }
    .status-approved { color: var(--accent); font-weight: 600; }
    .status-rejected { color: var(--error); font-weight: 600; }

    .action-cell { display: flex; gap: 6px; }
    .btn-approve { padding: 5px 12px; background: rgba(79,133,255,0.1); border: 1px solid var(--accent); border-radius: 5px; color: var(--accent); font-weight: 600; cursor: pointer; font-size: 0.8rem; }
    .btn-approve:hover { background: rgba(79,133,255,0.2); }
    .btn-reject  { padding: 5px 12px; background: rgba(248,113,113,0.1); border: 1px solid var(--error); border-radius: 5px; color: var(--error); font-weight: 600; cursor: pointer; font-size: 0.8rem; }
    .btn-reject:hover  { background: rgba(248,113,113,0.2); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-tab { padding: 6px 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; color: var(--dim); cursor: pointer; font-size: 0.85rem; }
    .btn-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(79,133,255,0.08); }
    .btn-dismiss { padding: 5px 12px; background: rgba(79,133,255,0.1); border: 1px solid var(--accent); border-radius: 5px; color: var(--accent); font-weight: 600; cursor: pointer; font-size: 0.8rem; }
    .btn-dismiss:hover { background: rgba(79,133,255,0.2); }
    .btn-uphold  { padding: 5px 12px; background: rgba(248,113,113,0.1); border: 1px solid var(--error);  border-radius: 5px; color: var(--error);  font-weight: 600; cursor: pointer; font-size: 0.8rem; }
    .btn-uphold:hover  { background: rgba(248,113,113,0.2); }

    .empty { text-align: center; color: var(--dim); padding: 40px; }
    .loading { text-align: center; color: var(--dim); padding: 40px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; font-size: 0.9rem; z-index: 100; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ===== Word Input Panel ===== */
    .wi-stats { padding: 12px 0 8px; font-size: 0.85rem; color: var(--dim); }
    .wi-stats strong { color: var(--accent); font-size: 1rem; }
    .wi-existing-info { font-size: 0.8rem; color: var(--dim); }
    .wi-chain { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 0; min-height: 44px; max-height: 160px; overflow-y: auto; }
    .wi-badge { display: inline-block; background: rgba(79,133,255,0.1); border: 1px solid rgba(79,133,255,0.3); border-radius: 6px; padding: 4px 10px; font-size: 0.95rem; font-weight: 700; letter-spacing: 1px; color: var(--accent); }
    .wi-badge-existing { background: rgba(255,255,255,0.03); border-color: var(--border); color: var(--dim); opacity: 0.55; }
    .wi-existing-label { font-size: 0.65rem; color: var(--dim); margin-left: 3px; vertical-align: middle; }
    .wi-input-row { display: flex; gap: 8px; margin-top: 12px; }
    .wi-word-input { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 1rem; padding: 10px 14px; outline: none; }
    .wi-word-input:focus { border-color: var(--accent); }
    .wi-submit-btn { white-space: nowrap; }
    .wi-summary { margin-top: 16px; padding: 12px 14px; background: rgba(79,133,255,0.05); border: 1px solid rgba(79,133,255,0.15); border-radius: 8px; }
    .wi-summary-title { font-size: 0.75rem; font-weight: 600; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .wi-summary-words { display: flex; flex-wrap: wrap; gap: 5px; }
    .wi-badge-sm { font-size: 0.8rem; padding: 2px 8px; }

    /* Required char bar (word-input panel) */
    .required-bar { display: flex; align-items: center; gap: 10px; padding: 10px 0; min-height: 48px; }
    .required-label { font-size: 0.75rem; color: var(--dim); white-space: nowrap; }
    .required-chars { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .req-char { display: inline-flex; align-items: center; gap: 4px; font-size: 1.3rem; font-weight: 800; color: var(--accent); background: rgba(79,133,255,0.1); border: 1.5px solid var(--accent); border-radius: 8px; padding: 4px 14px; }
    .req-char.dueum { color: #a07efa; background: rgba(160,126,250,0.1); border-color: #a07efa; }
    .req-char .dueum-badge { font-size: 0.55rem; font-weight: 600; color: #a07efa; background: rgba(160,126,250,0.2); border-radius: 4px; padding: 1px 4px; }
    .req-or { font-size: 0.75rem; color: var(--dim); }

    /* Word Management */
    .wm-search-row { display: flex; gap: 8px; padding: 16px 20px; background: var(--card); border-bottom: 1px solid var(--border); }
    .wm-input { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 12px; outline: none; }
    .wm-input:focus { border-color: var(--accent); }
    .wm-btn { padding: 8px 16px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .wm-edit-form { padding: 20px; background: var(--card); border-radius: var(--radius); margin: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
    .wm-field { display: flex; align-items: center; gap: 12px; }
    .wm-label { width: 120px; color: var(--dim); font-size: 0.85rem; }
    .wm-val { flex: 1; }
    .wm-save-btn { align-self: flex-end; padding: 10px 24px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; }
  </style>
</head>
<body>

<h1>끝말잇기 관리자 <span>오답 단어 검토</span><a href="/ranking.html" class="btn-home" style="margin-right:8px">🏆 전체 랭킹</a><a href="/" class="btn-home"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>게임으로</a></h1>

<!-- 로그인 -->
<section id="loginSection">
  <div class="login-box">
    <h2>관리자 로그인</h2>
    <input type="password" id="pwInput" placeholder="비밀번호" autocomplete="current-password">
    <button class="btn-login" id="loginBtn">로그인</button>
    <div class="error-text hidden" id="loginError">비밀번호가 올바르지 않습니다.</div>
  </div>
</section>

<!-- 메인 -->
<section id="mainSection">
  <div class="toolbar">
    <button class="btn-tab active" id="tabRejected" onclick="switchTab('rejected')">오답 집계</button>
    <button class="btn-tab" id="tabChallenges" onclick="switchTab('challenges')">이의 제기</button>
    <button class="btn-tab" id="tabWordInput" onclick="switchTab('word-input')">단어 입력</button>
    <button class="btn-tab" id="tabWordMgmt" onclick="switchTab('word-mgmt')">단어 관리</button>
    <span class="toolbar-sub" id="wordCount"></span>
    <button class="btn-refresh" id="refreshBtn">새로고침</button>
  </div>

  <!-- 오답 집계 -->
  <div id="panelRejected">
    <div class="table-wrap">
      <div class="loading" id="tableLoading">불러오는 중...</div>
      <table id="wordTable" style="display:none">
        <thead>
          <tr>
            <th>단어</th>
            <th>오답 횟수</th>
            <th>마지막 입력</th>
            <th>현재 상태</th>
            <th>처리</th>
          </tr>
        </thead>
        <tbody id="wordTableBody"></tbody>
      </table>
      <div class="empty hidden" id="emptyMsg">검토할 단어가 없습니다.</div>
    </div>
  </div>

  <!-- 이의 제기 -->
  <div id="panelChallenges" style="display:none">
    <div class="table-wrap">
      <div class="loading" id="challengeLoading">불러오는 중...</div>
      <table id="challengeTable" style="display:none">
        <thead>
          <tr>
            <th>단어</th>
            <th>이의 횟수</th>
            <th>마지막 제기</th>
            <th>처리</th>
          </tr>
        </thead>
        <tbody id="challengeTableBody"></tbody>
      </table>
      <div class="empty hidden" id="challengeEmptyMsg">이의 제기된 단어가 없습니다.</div>
    </div>
  </div>

  <!-- 단어 입력 -->
  <div id="panelWordInput" style="display:none">
    <div class="table-wrap">
      <div class="wi-stats">
        신규 추가: <strong id="wiCount">0</strong>단어
        <span class="wi-existing-info" id="wiExistingInfo" style="display:none">
          &nbsp;·&nbsp; 기존 단어: <span id="wiExistingCount">0</span>개
        </span>
      </div>
      <div class="required-bar wi-required-bar" id="wiRequiredBar" style="opacity:0.4">
        <span class="required-label">연결 힌트 (제한 없음)</span>
        <div class="required-chars" id="wiRequiredCharsDisplay"></div>
      </div>
      <div class="wi-chain" id="wiChain"></div>
      <div class="wi-summary" id="wiSummary" style="display:none">
        <div class="wi-summary-title">이번 세션 신규 등록</div>
        <div class="wi-summary-words" id="wiSummaryWords"></div>
      </div>
      <div class="wi-input-row">
        <input type="text" id="wiWordInput" class="wi-word-input" placeholder="3글자 단어 입력..." maxlength="6" autocomplete="off" spellcheck="false">
        <button class="btn-approve wi-submit-btn" id="wiSubmitBtn">추가</button>
      </div>
      <div class="error-text hidden" id="wiError"></div>
    </div>
  </div>

  <!-- 단어 관리 -->
  <div id="panelWordMgmt" style="display:none">
    <div class="wm-search-row">
      <input type="text" id="wmSearchInput" class="wm-input" placeholder="검색할 단어 입력...">
      <button class="wm-btn" id="wmSearchBtn">검색</button>
    </div>
    <div id="wmResultArea">
      <div class="empty">단어를 검색해주세요.</div>
    </div>
  </div>
</section>

<script src="admin.js"></script>
</body>
</html>
