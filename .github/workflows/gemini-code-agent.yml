name: Gemini Code Agent

on:
  issues:
    types: [opened, labeled]

jobs:
  gemini-code-agent:
    if: |
      contains(github.event.issue.labels.*.name, 'ai') ||
      startsWith(github.event.issue.title, '[AI]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Collect repository files
        run: |
          find . \
            -type f \( \
              -name "*.py" -o -name "*.js" -o -name "*.ts" -o \
              -name "*.jsx" -o -name "*.tsx" -o -name "*.html" -o \
              -name "*.css" -o -name "*.json" -o -name "*.md" \
            \) \
            ! -path "./.git/*" \
            ! -path "./node_modules/*" \
            ! -path "./.github/*" \
            > /tmp/file_list.txt || true
          cat /tmp/file_list.txt

      - name: Run Gemini Code Agent
        id: gemini_agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          cat > /tmp/agent.py << 'PYEOF'
          import os
          import json
          import google.generativeai as genai
          genai.configure(api_key=os.environ["GEMINI_API_KEY"])
          model = genai.GenerativeModel("gemini-2.5-flash")
          issue_title = os.environ["ISSUE_TITLE"]
          issue_body = os.environ.get("ISSUE_BODY", "(no body)")
          issue_number = os.environ["ISSUE_NUMBER"]
          repo_files = {}
          try:
              with open("/tmp/file_list.txt") as f:
                  paths = [p.strip() for p in f if p.strip()]
          except Exception:
              paths = []
          MAX_CHARS = 20000
          total = 0
          for path in paths:
              try:
                  with open(path, "r", encoding="utf-8", errors="ignore") as fh:
                      content = fh.read()
                  if total + len(content) > MAX_CHARS:
                      repo_files[path] = content[:MAX_CHARS - total] + "\n...(truncated)"
                      break
                  repo_files[path] = content
                  total += len(content)
              except Exception:
                  pass
          files_section = "\n".join(f'<file path="{p}">\n{c}\n</file>' for p, c in repo_files.items())
          prompt = ("You are a senior software engineer.\n" "Analyze the GitHub Issue and modify ONLY what is explicitly requested. Do NOT modify anything else.\n" "Respond ONLY with a JSON object (no markdown, no backticks):\n" "{\n" '  "analysis": "brief analysis",\n' '  "changes": [\n' "    {\n" '      "path": "file path",\n' '      "action": "modify or create or delete",\n' '      "content": "full file content",\n' '      "reason": "reason"\n' "    }\n" "  ],\n" '  "summary": "one line summary for commit message"\n' "}\n\n" f"Issue #{issue_number}\n" f"Title: {issue_title}\n" f"Body:\n{issue_body}\n\n" f"Repository files:\n{files_section}")
          print(f"Calling Gemini API for issue #{issue_number}...")
          response = model.generate_content(prompt)
          raw = response.text.strip()
          if raw.startswith("```"):
              raw = "\n".join(raw.split("\n")[1:])
          if raw.endswith("```"):
              raw = "\n".join(raw.split("\n")[:-1])
          raw = raw.strip()
          result = json.loads(raw)
          for change in result.get("changes", []):
              path = change["path"].lstrip("./")
              action = change["action"]
              content = change.get("content", "")
              if action == "delete":
                  if os.path.exists(path):
                      os.remove(path)
                      print(f"Deleted: {path}")
              else:
                  parent = os.path.dirname(path)
                  if parent:
                      os.makedirs(parent, exist_ok=True)
                  with open(path, "w", encoding="utf-8") as fh:
                      fh.write(content)
                  print(f"{action}: {path}")
          summary = result.get("summary", "AI code update")
          analysis = result.get("analysis", "")
          with open(os.environ["GITHUB_ENV"], "a") as ef:
              ef.write(f"COMMIT_MSG={summary}\n")
              ef.write(f"GEMINI_ANALYSIS<<EOF\n{analysis}\nEOF\n")
          with open("/tmp/changes.json", "w") as cf:
              json.dump(result.get("changes", []), cf, ensure_ascii=False)
          print(f"Done: {summary}")
          PYEOF
          python3 /tmp/agent.py

      - name: Commit and push
        id: commit_push
        run: |
          git config user.name "Gemini Code Agent"
          git config user.email "gemini-agent@noreply.github.com"
          
          # 1. 변경된 파일이 있는지 먼저 확인
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            # 2. 내 변경 사항을 먼저 로컬에 커밋 (이래야 pull --rebase가 작동함)
            git commit -m "🤖 [Issue #${{ github.event.issue.number }}] ${{ env.COMMIT_MSG }}"
            
            # 3. 원격 저장소의 최신 내용을 가져와서 내 커밋을 그 위로 재정렬 (충돌 방지 핵심)
            # 만약 충돌이 나면 내 코드(Gemini)를 우선하도록 설정
            git pull --rebase -X theirs origin HEAD
            
            # 4. 최종 푸시
            git push origin HEAD
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Comment on issue (success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const hasChanges = process.env.HAS_CHANGES === 'true';
            const analysis = process.env.GEMINI_ANALYSIS || '';
            const commitMsg = process.env.COMMIT_MSG || '';
            const sha = context.sha;
            let changesTable = '';
            try {
              const changes = JSON.parse(fs.readFileSync('/tmp/changes.json', 'utf8'));
              const rows = changes.map(c => {
                const icon = c.action === 'modify' ? 'Modify' : c.action === 'create' ? 'Create' : 'Delete';
                return `| \`${c.path}\` | ${icon} | ${c.reason} |`;
              }).join('\n');
              changesTable = `\n| File | Action | Reason |\n|------|--------|--------|\n${rows}`;
            } catch(e) {}
            const body = hasChanges
              ? `## ✅ Gemini Code Agent 완료\n\n**분석**\n${analysis}\n\n**변경 파일**${changesTable}\n\n**커밋**: \`${sha.substring(0,7)}\` — ${commitMsg}\n\n> 코드가 자동으로 수정되어 Push되었습니다.`
              : `## ✅ Gemini Code Agent\n\n**분석**\n${analysis}\n\n> 코드 변경이 필요하지 않았습니다.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['ai-done']
              });
            } catch(e) {}

      - name: Comment on issue (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const stepOutcome = '${{ steps.gemini_agent.outcome }}';
            const pushOutcome = '${{ steps.commit_push.outcome }}';
            let errorMsg = '';
            if (stepOutcome === 'failure') {
              errorMsg = 'Gemini API 호출 또는 코드 수정 중 오류가 발생했습니다.';
            } else if (pushOutcome === 'failure') {
              errorMsg = 'Git Push 중 오류가 발생했습니다. (충돌 또는 권한 문제)';
            } else {
              errorMsg = '알 수 없는 오류가 발생했습니다.';
            }
            const body = `## ❌ Gemini Code Agent 실패\n\n**오류 단계**: ${stepOutcome === 'failure' ? 'Gemini 코드 수정' : 'Git Push'}\n\n**원인**: ${errorMsg}\n\n> Actions 탭에서 상세 로그를 확인하세요.\n> \`github.com/${{ github.repository }}/actions\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['ai-failed']
              });
            } catch(e) {}
