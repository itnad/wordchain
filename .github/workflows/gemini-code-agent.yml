name: Gemini Code Agent

on:
  issues:
    types: [labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  gemini-code-agent:
    if: |
      contains(github.event.issue.labels.*.name, 'ai') ||
      startsWith(github.event.issue.title, '[AI]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai

      - name: Collect repository files
        run: |
          find . \
            -type f \( \
              -name "*.py" -o -name "*.js" -o -name "*.ts" -o \
              -name "*.jsx" -o -name "*.tsx" -o -name "*.html" -o \
              -name "*.css" -o -name "*.json" -o -name "*.md" \
            \) \
            ! -path "./.git/*" \
            ! -path "./node_modules/*" \
            ! -path "./.github/*" \
            > /tmp/file_list.txt || true

      # ── REVERT 모드 감지: 제목이 "REVERT: <해시>"로 시작하면 revert 실행 ──
      - name: Detect mode
        id: detect_mode
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          REVERT_HASH=$(echo "$ISSUE_TITLE" | grep -oP '(?<=^REVERT:\s)[a-f0-9A-F]{5,40}' || true)
          if [ -n "$REVERT_HASH" ]; then
            echo "MODE=revert" >> $GITHUB_ENV
            echo "REVERT_HASH=$REVERT_HASH" >> $GITHUB_ENV
            echo "✅ REVERT 모드 감지: $REVERT_HASH"
          else
            echo "MODE=ai" >> $GITHUB_ENV
            echo "✅ AI 모드 감지"
          fi

      # ── REVERT 모드 ──
      - name: Revert commit
        if: env.MODE == 'revert'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # ✅ 최신 커밋 여부 확인 (앞 7자리로 비교)
          LATEST_HASH=$(git rev-parse --short=7 HEAD)
          INPUT_SHORT="${{ env.REVERT_HASH }}"
          INPUT_SHORT="${INPUT_SHORT:0:7}"

          echo "최신 커밋: $LATEST_HASH / 입력 해시: $INPUT_SHORT"

          if [ "$LATEST_HASH" != "$INPUT_SHORT" ]; then
            echo "ERROR_TYPE=not_latest" >> $GITHUB_ENV
            echo "❌ 최신 커밋이 아닙니다. REVERT 불가."
            exit 1
          fi

          echo "🔄 커밋 되돌리기: ${{ env.REVERT_HASH }}"

          if ! git revert ${{ env.REVERT_HASH }} --no-edit; then
            echo "ERROR_TYPE=conflict" >> $GITHUB_ENV
            exit 1
          fi

          SUCCESS=false
          for i in {1..3}; do
            if git push origin main; then
              SUCCESS=true
              break
            fi
            echo "Push rejected. Retrying in 5s..."
            sleep 5
          done

          if [ "$SUCCESS" = false ]; then exit 1; fi
          echo "HAS_CHANGES=true" >> $GITHUB_ENV
          echo "COMMIT_MSG=커밋 ${{ env.REVERT_HASH }} 되돌리기 완료" >> $GITHUB_ENV
          echo "ERROR_TYPE=none" >> $GITHUB_ENV

      # ── AI 모드 ──
      - name: Run Gemini Code Agent
        id: gemini_agent
        if: env.MODE == 'ai'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          cat > /tmp/agent.py << 'PYEOF'
          import os
          import json
          from google import genai
          from google.genai import types

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          MODEL_ID = "gemini-3-flash-preview"
          # MODEL_ID = "models/gemini-3-flash-preview"
          # "gemini-2.5-flash"
          # "gemini-3.1-pro-preview"

          system_instruction = (
              "너는 세계 수준급의 시니어 개발자다. "
              "아래 규칙을 반드시 준수해라:\n"
              "1. 이슈에서 명시적으로 요청한 부분만 수정해라. 요청하지 않은 코드는 절대 건드리지 마라.\n"
              "2. 보안 관련 코드(인증, 비밀번호, 세션, 권한 등)는 요청이 없으면 절대 수정하지 마라.\n"
              "3. 기존 로직을 삭제하거나 비활성화하지 마라. 추가만 허용된다.\n"
              "4. 요청 범위 밖의 리팩토링, 최적화, 보안 개선은 하지 마라.\n"
              "5. JSON 형식 엄수."
          )

          repo_files = {}
          with open("/tmp/file_list.txt") as f:
              paths = [p.strip() for p in f if p.strip()]

          for path in paths:
              try:
                  with open(path, "r", encoding="utf-8", errors="ignore") as fh:
                      repo_files[path] = fh.read()
              except: pass

          files_context = "\n".join(f'<file path="{p}">\n{c}\n</file>' for p, c in repo_files.items())
          prompt = f"Issue #{os.environ['ISSUE_NUMBER']}: {os.environ['ISSUE_TITLE']}\n{os.environ.get('ISSUE_BODY', '')}\n\nContext:\n{files_context}"

          try:
              response = client.models.generate_content(
                  model=MODEL_ID,
                  contents=prompt,
                  config=types.GenerateContentConfig(
                      system_instruction=system_instruction,
                      temperature=0.1,
                      response_mime_type="application/json",
                      max_output_tokens=8192
                  )
              )

              raw = response.parsed if response.parsed else json.loads(response.text)

              # ✅ 리스트로 반환된 경우 딕셔너리로 감싸기
              if isinstance(raw, list):
                  result = {"changes": raw, "summary": "AI fix", "analysis": ""}
              elif isinstance(raw, dict):
                  result = raw
              else:
                  raise ValueError(f"Unexpected response type: {type(raw)}")

              for change in result.get("changes", []):
                  # ✅ 다양한 키 이름 대응
                  file_path = (
                      change.get("path") or
                      change.get("file_path") or
                      change.get("filename") or
                      change.get("file") or
                      ""
                  )
                  file_content = (
                      change.get("content") or
                      change.get("code") or
                      change.get("file_content") or
                      ""
                  )

                  if not file_path:
                      print(f"Warning: 경로를 찾을 수 없는 change 항목 건너뜀: {change.keys()}")
                      continue

                  file_path = file_path.lstrip("./")

                  # ✅ 파일 내용 검증: 기존 파일 대비 10% 미만으로 줄어들면 스킵
                  original_content = repo_files.get("./" + file_path, repo_files.get(file_path, ""))
                  original_size = len(original_content)
                  new_size = len(file_content)
                  if original_size > 100 and new_size < original_size * 0.1:
                      print(f"Warning: {file_path} 내용이 기존({original_size}자)의 10% 미만({new_size}자)으로 줄어듦 → 스킵 (응답 잘림 의심)")
                      continue

                  os.makedirs(os.path.dirname(file_path) or '.', exist_ok=True)
                  with open(file_path, "w", encoding="utf-8") as fh:
                      fh.write(file_content)

              with open(os.environ["GITHUB_ENV"], "a") as ef:
                  ef.write(f"COMMIT_MSG={result.get('summary', 'AI fix')}\n")
                  clean_analysis = result.get('analysis', '').replace('\n', ' ').replace('\r', '')
                  ef.write(f"GEMINI_ANALYSIS={clean_analysis}\n")
                  ef.write("ERROR_TYPE=none\n")

          except Exception as e:
              error_str = str(e)
              with open(os.environ["GITHUB_ENV"], "a") as ef:
                  if "503" in error_str or "UNAVAILABLE" in error_str:
                      ef.write("ERROR_TYPE=503\n")
                  else:
                      ef.write("ERROR_TYPE=unknown\n")
              print(f"Error: {e}")
              raise e
          PYEOF
          python3 /tmp/agent.py

      - name: Commit and push safely
        if: env.MODE == 'ai'
        id: commit_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            git commit -m "🤖 [Issue #${{ github.event.issue.number }}] ${{ env.COMMIT_MSG }}"

            SUCCESS=false
            for i in {1..3}; do
              if git pull --rebase -X theirs origin main && git push origin main; then
                SUCCESS=true
                break
              fi
              echo "Push rejected. Retrying in 5s..."
              sleep 5
            done

            if [ "$SUCCESS" = false ]; then exit 1; fi
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Comment on issue
        if: always()
        uses: actions/github-script@v7
        env:
          HAS_CHANGES: ${{ env.HAS_CHANGES }}
          GEMINI_ANALYSIS: ${{ env.GEMINI_ANALYSIS }}
          COMMIT_MSG: ${{ env.COMMIT_MSG }}
          JOB_STATUS: ${{ job.status }}
          ERROR_TYPE: ${{ env.ERROR_TYPE }}
          MODE: ${{ env.MODE }}
          REVERT_HASH: ${{ env.REVERT_HASH }}
        with:
          script: |
            const { HAS_CHANGES, GEMINI_ANALYSIS, COMMIT_MSG, JOB_STATUS, ERROR_TYPE, MODE, REVERT_HASH } = process.env;
            let body = '';
            if (JOB_STATUS === 'success') {
              if (MODE === 'revert') {
                body = `## ✅ REVERT: ${REVERT_HASH} 실행 완료.`;
              } else {
                body = `## ✅ gemini-3-flash-preview 작업 완료\n\n**분석:**\n${GEMINI_ANALYSIS}\n\n`;
                body += HAS_CHANGES === 'true'
                  ? `> 🛠 **Push 성공:** ${COMMIT_MSG}`
                  : `> ✨ 변경 사항이 없어 종료되었습니다.`;
              }
            } else if (ERROR_TYPE === '503') {
              body = `## ⚠️ Gemini 서버 오류\n\n**503 UNAVAILABLE** - Gemini 서버에 현재 요청이 폭주하고 있습니다.\n\n> 잠시 후 이슈에 \`ai\` 라벨을 다시 추가하여 재시도해 주세요.`;
            } else if (MODE === 'revert' && ERROR_TYPE === 'not_latest') {
              body = `## ❌ REVERT 불가\n\n커밋 \`${REVERT_HASH}\` 은 최신 커밋이 아닙니다.\n\n> 최신 커밋만 되돌릴 수 있습니다. GitHub에서 최신 커밋 해시를 확인해 주세요.`;
            } else if (MODE === 'revert') {
              body = `## ❌ 되돌리기 실패\n\n커밋 \`${REVERT_HASH}\` 을 되돌리는 중 오류가 발생했습니다.\n\n> Actions 로그를 확인해 주세요.`;
            } else {
              body = `## ❌ 작업 실패\n\nGit 충돌 또는 설정 오류가 발생했습니다. Actions 로그를 확인해 주세요.`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
