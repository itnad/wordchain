name: Gemini Code Agent

on:
  issues:
    types: [labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  gemini-code-agent:
    if: contains(github.event.issue.labels.*.name, 'ai')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai

      - name: Collect repository files
        run: |
          find . -type f \( \
            -name "*.py" -o -name "*.js" -o -name "*.ts" -o \
            -name "*.jsx" -o -name "*.tsx" -o -name "*.html" -o \
            -name "*.json" -o -name "*.md" -o -name "*.css" \
          \) \
          ! -path "./.git/*" ! -path "./node_modules/*" ! -path "./.github/*" \
          > /tmp/file_list.txt || true
            
      - name: Run Gemini Code Agent
        id: gemini_agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          cat > /tmp/agent.py << 'PYEOF'
          import os
          import json
          from google import genai
          from google.genai import types

          # 1. 클라이언트 설정 (버전 명시를 제거하여 404 경로 오류를 방지합니다)
          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])
          
          # 2. 검증된 모델 ID (models/ 접두사 포함)
          # 'gemini-1.5-pro'는 고성능 모델로, 404 없이 확실하게 작동하는 표준 ID입니다.
          MODEL_ID = "models/gemini-1.5-pro" 

          system_instruction = (
              "너는 세계 최고의 시니어 리액트 및 알고리즘 개발자다.\n"
              "사용자의 요청에 따라 코드를 수정하거나 새로운 기능을 구현하라.\n"
              "1. 보존: 한국어 음절 분리, 두음법칙 등 고도의 한글 처리 로직은 절대 건드리지 마라.\n"
              "2. 추론: 코드를 수정하기 전 논리적 모순이 없는지 체계적으로 분석하라.\n"
              "3. 형식: 반드시 순수한 JSON 객체 {analysis, changes, summary}로만
