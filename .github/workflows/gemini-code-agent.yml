name: Gemini Code Agent

on:
  issues:
    types: [labeled] # opened를 제거

# 동일 이슈에 대해 여러 번 실행될 경우 중복 방지
concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  gemini-code-agent:
    if: |
      contains(github.event.issue.labels.*.name, 'ai') ||
      startsWith(github.event.issue.title, '[AI]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Rebase를 위해 전체 히스토리 필요

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Collect repository files
        run: |
          find . \
            -type f \( \
              -name "*.py" -o -name "*.js" -o -name "*.ts" -o \
              -name "*.jsx" -o -name "*.tsx" -o -name "*.html" -o \
              -name "*.css" -o -name "*.json" -o -name "*.md" \
            \) \
            ! -path "./.git/*" \
            ! -path "./node_modules/*" \
            ! -path "./.github/*" \
            > /tmp/file_list.txt || true
            
      - name: Run Gemini Code Agent
        id: gemini_agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          cat > /tmp/agent.py << 'PYEOF'
          import os
          import json
          import google.generativeai as genai
    
          # 1. API 및 모델 설정
          genai.configure(api_key=os.environ["GEMINI_API_KEY"])
    
          # [시스템 지시문 세팅]: 모델의 페르소나와 제약 사항을 정의
          system_instruction = (
              "너는 세계 최고의 시니어 리액트 및 웹 개발자다. GitHub Issue를 분석하여 코드를 수정하라.\n"
              "1. 보존 규칙: 한국어 음절 분리, 두음법칙 등 고도의 한글 로직은 절대 파괴하지 말고 그대로 유지하라.\n"
              "2. 형식 규칙: 반드시 순수한 JSON 객체로만 응답하라. 마크다운 코드 블록(```json)을 사용하지 마라.\n"
              "3. 품질 규칙: 수정된 코드는 즉시 실행 가능해야 하며, 가독성이 높아야 한다.\n"
              "4. 일관성: 파일의 기존 코딩 스타일(들여쓰기, 변수 명명 규칙 등)을 따르라."
          )
    
          # [생성 설정 세팅]: 논리적 정확도를 위해 온도를 낮춤
          generation_config = {
              "temperature": 0.1,  # 낮을수록 일관되고 논리적인 코드 생성
              "top_p": 0.95,
              "max_output_tokens": 20000, # 긴 코드 수정을 위해 넉넉히 설정
          }
    
          model = genai.GenerativeModel(
              model_name="gemini-3.1-pro-preview",
              system_instruction=system_instruction,
              generation_config=generation_config
          )
          
          issue_title = os.environ["ISSUE_TITLE"]
          issue_body = os.environ.get("ISSUE_BODY", "(no body)")
          issue_number = os.environ["ISSUE_NUMBER"]
          
          repo_files = {}
          try:
              with open("/tmp/file_list.txt") as f:
                  paths = [p.strip() for p in f if p.strip()]
          except: paths = []
    
          # 파일 수집 (토큰 제한 내에서 최대한 수집)
          MAX_CHARS = 100000 # 3.1 Pro의 넓은 컨텍스트를 활용해 수집량 증가
          total = 0
          for path in paths:
              try:
                  with open(path, "r", encoding="utf-8", errors="ignore") as fh:
                      content = fh.read()
                  if total + len(content) > MAX_CHARS: break
                  repo_files[path] = content
                  total += len(content)
              except: pass
    
          files_section = "\n".join(f'<file path="{p}">\n{c}\n</file>' for p, c in repo_files.items())
    
          # [프롬프트 전략]: 맥락 정보를 명확히 구분하여 전달
          prompt = (
              f"Analyze GitHub Issue #{issue_number} and modify the code accordingly.\n\n"
              f"### ISSUE TITLE\n{issue_title}\n\n"
              f"### ISSUE BODY\n{issue_body}\n\n"
              f"### REPOSITORY CONTEXT\n{files_section}\n\n"
              "--- \n"
              "TASK: Respond with a JSON object containing 'analysis', 'changes' (list of path/action/content/reason), and 'summary'."
          )
    
          response = model.generate_content(prompt)
          
          # 응답 정제 및 파싱
          raw = response.text.strip()
          # 간혹 포함될 수 있는 마크다운 태그 강제 제거
          if raw.startswith("```"):
              raw = raw.split("\n", 1)[-1].rsplit("\n", 1)[0]
          if raw.startswith("json"):
              raw = raw[4:]
          
          result = json.loads(raw.strip())
    
          for change in result.get("changes", []):
              path = change["path"].lstrip("./")
              if change["action"] == "delete":
                  if os.path.exists(path): os.remove(path)
              else:
                  os.makedirs(os.path.dirname(path) or '.', exist_ok=True)
                  with open(path, "w", encoding="utf-8") as fh: fh.write(change["content"])
    
          with open(os.environ["GITHUB_ENV"], "a") as ef:
              ef.write(f"COMMIT_MSG={result.get('summary', 'AI code update')}\n")
              ef.write(f"GEMINI_ANALYSIS<<EOF\n{result.get('analysis', '')}\nEOF\n")
          with open("/tmp/changes.json", "w") as cf:
              json.dump(result.get("changes", []), cf, ensure_ascii=False)
          PYEOF
          python3 /tmp/agent.py

      - name: Commit and push safely
        id: commit_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          if git diff --cached --quiet; then
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            git commit -m "🤖 [Issue #${{ github.event.issue.number }}] ${{ env.COMMIT_MSG }}"
            
            # 수동 수정본(Remote)이 있을 경우 Gemini의 작업을 그 위로 Rebase
            # 충돌 발생 시 Gemini의 작업(-X theirs)을 우선하여 덮어씀
            SUCCESS=false
            for i in {1..3}; do
              if git pull --rebase -X theirs origin main && git push origin main; then
                SUCCESS=true
                break
              fi
              echo "Push rejected. Retrying in 5s..."
              sleep 5
            done
            
            if [ "$SUCCESS" = false ]; then exit 1; fi
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Comment on issue
        if: always()
        uses: actions/github-script@v7
        env:
          HAS_CHANGES: ${{ env.HAS_CHANGES }}
          GEMINI_ANALYSIS: ${{ env.GEMINI_ANALYSIS }}
          COMMIT_MSG: ${{ env.COMMIT_MSG }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const { HAS_CHANGES, GEMINI_ANALYSIS, COMMIT_MSG, JOB_STATUS } = process.env;
            let body = '';
            if (JOB_STATUS === 'success') {
              body = `## ✅ Gemini 작업 완료\n\n**분석:**\n${GEMINI_ANALYSIS}\n\n`;
              body += HAS_CHANGES === 'true' 
                ? `> 🛠 **Push 성공:** ${COMMIT_MSG}`
                : `> ✨ 변경 사항이 없어 종료되었습니다.`;
            } else {
              body = `## ❌ 작업 실패\n\nGit 충돌 또는 설정 오류가 발생했습니다. Actions 로그를 확인해 주세요.`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
