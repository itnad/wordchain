name: Gemini Code Agent

on:
  issues:
    types: [labeled] # opened를 제거

# 동일 이슈에 대해 여러 번 실행될 경우 중복 방지
concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  gemini-code-agent:
    # 제목에 [AI]가 있거나 'ai' 레이블이 있을 때만 실행
    if: |
      contains(github.event.issue.labels.*.name, 'ai') ||
      startsWith(github.event.issue.title, '[AI]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Rebase를 위해 전체 히스토리 필요

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai

      - name: Collect repository files
        run: |
          find . \
            -type f \( \
              -name "*.py" -o -name "*.js" -o -name "*.ts" -o \
              -name "*.jsx" -o -name "*.tsx" -o -name "*.html" -o \
              -name "*.css" -o -name "*.json" -o -name "*.md" \
            \) \
            ! -path "./.git/*" \
            ! -path "./node_modules/*" \
            ! -path "./.github/*" \
            > /tmp/file_list.txt || true

      - name: Run Gemini Code Agent
        id: gemini_agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          cat > /tmp/agent.py << 'PYEOF'
          import os
          import json
          from google import genai
          from google.genai import types

          # [수정 핵심] api_version 설정을 제거하여 404를 방지합니다.
          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])
          
          # [수정 핵심] models/ 접두사를 포함한 Gemini ID
          MODEL_ID = "models/gemini-3-flash-preview"
          # "gemini-2.5-flash"
          # "gemini-3.1-pro-preview"
          
          system_instruction = (
              "너는 세계 수준급의 시니어 개발자다. 1. 수정 요청하지 않은 부분은 기존 로직을 최대한 보존 2. JSON 형식 엄수 3. 요청 기능 수정 후 전체적인 오류 없는지 검토해서 개발해줘."
          )
          
          repo_files = {}
          with open("/tmp/file_list.txt") as f:
              paths = [p.strip() for p in f if p.strip()]

          for path in paths:
              try:
                  with open(path, "r", encoding="utf-8", errors="ignore") as fh:
                      repo_files[path] = fh.read()
              except: pass

          files_context = "\n".join(f'<file path="{p}">\n{c}\n</file>' for p, c in repo_files.items())
          prompt = f"Issue #{os.environ['ISSUE_NUMBER']}: {os.environ['ISSUE_TITLE']}\n{os.environ.get('ISSUE_BODY', '')}\n\nContext:\n{files_context}"

          try:
              response = client.models.generate_content(
                  model=MODEL_ID,
                  contents=prompt,
                  config=types.GenerateContentConfig(
                      system_instruction=system_instruction,
                      temperature=0.1,
                      response_mime_type="application/json"
                  )
              )
              result = response.parsed if response.parsed else json.loads(response.text)

              for change in result.get("changes", []):
                  path = change["path"].lstrip("./")
                  os.makedirs(os.path.dirname(path) or '.', exist_ok=True)
                  with open(path, "w", encoding="utf-8") as fh: fh.write(change["content"])

              with open(os.environ["GITHUB_ENV"], "a") as ef:
                  ef.write(f"COMMIT_MSG={result.get('summary', 'AI fix')}\n")
                  # 줄바꿈 문제 해결을 위해 analysis 텍스트 처리
                  clean_analysis = result.get('analysis', '').replace('\n', ' ').replace('\r', '')
                  ef.write(f"GEMINI_ANALYSIS={clean_analysis}\n")
          except Exception as e:
              print(f"Error: {e}")
              raise e
          PYEOF
          python3 /tmp/agent.py

      - name: Commit and push safely
        id: commit_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          if git diff --cached --quiet; then
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            git commit -m "🤖 [Issue #${{ github.event.issue.number }}] ${{ env.COMMIT_MSG }}"
            
            # 수동 수정본(Remote)이 있을 경우 Gemini의 작업을 그 위로 Rebase
            # 충돌 발생 시 Gemini의 작업(-X theirs)을 우선하여 덮어씀
            SUCCESS=false
            for i in {1..3}; do
              if git pull --rebase -X theirs origin main && git push origin main; then
                SUCCESS=true
                break
              fi
              echo "Push rejected. Retrying in 5s..."
              sleep 5
            done
            
            if [ "$SUCCESS" = false ]; then exit 1; fi
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Comment on issue
        if: always()
        uses: actions/github-script@v7
        env:
          HAS_CHANGES: ${{ env.HAS_CHANGES }}
          GEMINI_ANALYSIS: ${{ env.GEMINI_ANALYSIS }}
          COMMIT_MSG: ${{ env.COMMIT_MSG }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const { HAS_CHANGES, GEMINI_ANALYSIS, COMMIT_MSG, JOB_STATUS } = process.env;
            let body = '';
            if (JOB_STATUS === 'success') {
              body = `## ✅ gemini-3-flash-preview 작업 완료\n\n**분석:**\n${GEMINI_ANALYSIS}\n\n`;
              body += HAS_CHANGES === 'true' 
                ? `> 🛠 **Push 성공:** ${COMMIT_MSG}`
                : `> ✨ 변경 사항이 없어 종료되었습니다.`;
            } else {
              body = `## ❌ 작업 실패\n\nGit 충돌 또는 설정 오류가 발생했습니다. Actions 로그를 확인해 주세요.`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
