name: 🤖 Claude Code Agent

on:
  issues:
    types: [opened, labeled]

# 이슈에 'claude' 라벨이 있거나, 제목에 [CLAUDE] 태그가 있을 때만 실행
jobs:
  claude-code-agent:
    if: |
      contains(github.event.issue.labels.*.name, 'claude') ||
      startsWith(github.event.issue.title, '[CLAUDE]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      # ── 1. 레포 체크아웃 ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python 세팅 ────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      # ── 3. 레포 파일 목록 수집 ───────────────────────────────────
      - name: Collect repository files
        id: collect_files
        run: |
          # 주요 소스 파일만 수집 (필요에 따라 확장자 추가)
          find . \
            -type f \
            \( -name "*.py" -o -name "*.js" -o -name "*.ts" -o -name "*.jsx" \
               -o -name "*.tsx" -o -name "*.html" -o -name "*.css" \
               -o -name "*.json" -o -name "*.md" \) \
            ! -path "./.git/*" \
            ! -path "./node_modules/*" \
            ! -path "./.github/*" \
            > /tmp/file_list.txt
          echo "files_found=$(wc -l < /tmp/file_list.txt)" >> $GITHUB_OUTPUT
          cat /tmp/file_list.txt

      # ── 4. Claude API 호출 → 코드 수정 ──────────────────────────
      - name: Run Claude Code Agent
        id: claude_agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import json
          import anthropic

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

          issue_title = os.environ["ISSUE_TITLE"]
          issue_body  = os.environ["ISSUE_BODY"] or "(본문 없음)"
          issue_number = os.environ["ISSUE_NUMBER"]

          # ── 레포 파일 읽기 ──────────────────────────────────────
          repo_files = {}
          with open("/tmp/file_list.txt") as f:
              paths = [p.strip() for p in f if p.strip()]

          MAX_CHARS = 80000   # 컨텍스트 윈도우 절약
          total = 0
          for path in paths:
              try:
                  with open(path, "r", encoding="utf-8", errors="ignore") as fh:
                      content = fh.read()
                  if total + len(content) > MAX_CHARS:
                      repo_files[path] = content[:MAX_CHARS - total] + "\n... (truncated)"
                      break
                  repo_files[path] = content
                  total += len(content)
              except Exception:
                  pass

          files_xml = "\n".join(
              f"<file path=\"{p}\">\n{c}\n</file>"
              for p, c in repo_files.items()
          )

          # ── Claude 프롬프트 ─────────────────────────────────────
          system_prompt = """당신은 시니어 소프트웨어 엔지니어입니다.
GitHub Issue를 분석하고, 레포지토리의 코드를 직접 수정해야 합니다.

반드시 아래 JSON 형식으로만 응답하세요 (마크다운 블록 없이):
{
  "analysis": "이슈 분석 내용",
  "changes": [
    {
      "path": "수정할 파일 경로 (기존 파일) 또는 새 파일 경로",
      "action": "modify | create | delete",
      "content": "파일의 전체 내용 (delete면 빈 문자열)",
      "reason": "수정 이유"
    }
  ],
  "summary": "변경 사항 요약 (커밋 메시지용, 한 줄)"
}

규칙:
- 이슈 지시에만 집중하여 최소한의 변경만 수행
- 기존 코드 스타일과 일관성 유지
- 테스트 코드도 필요하면 추가
- 절대로 JSON 외의 텍스트를 출력하지 마세요"""

          user_prompt = f"""## GitHub Issue #{issue_number}

**제목**: {issue_title}

**내용**:
{issue_body}

## 현재 레포지토리 파일들

<repository_files>
{files_xml}
</repository_files>

위 이슈를 해결하기 위해 필요한 코드 변경사항을 JSON으로 출력하세요."""

          print(f"📨 Claude API 호출 중... (이슈 #{issue_number})")

          response = client.messages.create(
              model="claude-sonnet-4-20250514",
              max_tokens=8000,
              system=system_prompt,
              messages=[{"role": "user", "content": user_prompt}]
          )

          raw = response.content[0].text.strip()

          # JSON 파싱
          if raw.startswith("```"):
              raw = "\n".join(raw.split("\n")[1:])
          if raw.endswith("```"):
              raw = "\n".join(raw.split("\n")[:-1])

          result = json.loads(raw.strip())

          # ── 파일 적용 ───────────────────────────────────────────
          for change in result["changes"]:
              path    = change["path"].lstrip("./")
              action  = change["action"]
              content = change.get("content", "")

              if action == "delete":
                  if os.path.exists(path):
                      os.remove(path)
                      print(f"🗑️  삭제: {path}")
              else:
                  os.makedirs(os.path.dirname(path) or ".", exist_ok=True)
                  with open(path, "w", encoding="utf-8") as fh:
                      fh.write(content)
                  print(f"{'✏️ ' if action=='modify' else '🆕'} {action}: {path}")

          # 결과를 환경 변수에 저장
          summary = result["summary"]
          analysis = result["analysis"]

          with open(os.environ["GITHUB_ENV"], "a") as env_file:
              env_file.write(f"COMMIT_MSG={summary}\n")
              env_file.write(f"CLAUDE_ANALYSIS<<EOF\n{analysis}\nEOF\n")

          changes_json = json.dumps(result["changes"], ensure_ascii=False)
          with open("/tmp/changes.json", "w") as f:
              f.write(changes_json)

          print(f"✅ 완료: {summary}")
          PYTHON_SCRIPT

      # ── 5. 변경사항 커밋 & 푸시 ────────────────────────────────
      - name: Commit and push changes
        run: |
          git config user.name  "Claude Code Agent"
          git config user.email "claude-agent@noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "변경사항 없음 — 커밋 스킵"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            git commit -m "🤖 [Issue #${{ github.event.issue.number }}] ${{ env.COMMIT_MSG }}"
            git push origin HEAD
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      # ── 6. 이슈에 결과 댓글 달기 ───────────────────────────────
      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const hasChanges = process.env.HAS_CHANGES === 'true';
            const analysis   = process.env.CLAUDE_ANALYSIS;
            const commitMsg  = process.env.COMMIT_MSG;
            const sha = context.sha;

            let changesTable = '';
            try {
              const changes = JSON.parse(fs.readFileSync('/tmp/changes.json', 'utf8'));
              const rows = changes.map(c =>
                `| \`${c.path}\` | ${c.action === 'modify' ? '✏️ 수정' : c.action === 'create' ? '🆕 생성' : '🗑️ 삭제'} | ${c.reason} |`
              ).join('\n');
              changesTable = `
            | 파일 | 작업 | 이유 |
            |------|------|------|
            ${rows}`;
            } catch(e) {}

            const body = hasChanges
              ? `## 🤖 Claude Code Agent 완료

            **분석**
            ${analysis}

            **변경된 파일**
            ${changesTable}

            **커밋**: \`${sha.substring(0,7)}\` — ${commitMsg}

            > ✅ 코드가 자동으로 수정되어 Push되었습니다.`
              : `## 🤖 Claude Code Agent

            **분석**
            ${analysis}

            > ℹ️ 코드 변경이 필요하지 않아 커밋하지 않았습니다.`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            // 이슈에 완료 라벨 추가
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              labels: ['claude-done']
            });
