name: Groq Code Agent
on:
  issues:
    types: [opened, labeled]
jobs:
  groq-code-agent:
    if: |
      contains(github.event.issue.labels.*.name, 'ai') ||
      startsWith(github.event.issue.title, '[AI]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install groq
      - name: Collect repository files
        run: |
          find . -type f \( -name "*.py" -o -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" -o -name "*.html" -o -name "*.css" -o -name "*.json" -o -name "*.md" \) ! -path "./.git/*" ! -path "./node_modules/*" ! -path "./.github/*" > /tmp/file_list.txt || true
          cat /tmp/file_list.txt
      - name: Run Groq Code Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          cat > /tmp/agent.py << 'PYEOF'
          import os
          import json
          from groq import Groq
          client = Groq(api_key=os.environ["GROQ_API_KEY"])
          issue_title = os.environ["ISSUE_TITLE"]
          issue_body = os.environ.get("ISSUE_BODY", "(no body)")
          issue_number = os.environ["ISSUE_NUMBER"]
          repo_files = {}
          try:
              with open("/tmp/file_list.txt") as f:
                  paths = [p.strip() for p in f if p.strip()]
          except Exception:
              paths = []
          MAX_CHARS = 20000
          total = 0
          for path in paths:
              try:
                  with open(path, "r", encoding="utf-8", errors="ignore") as fh:
                      content = fh.read()
                  if total + len(content) > MAX_CHARS:
                      repo_files[path] = content[:MAX_CHARS - total] + "\n...(truncated)"
                      break
                  repo_files[path] = content
                  total += len(content)
              except Exception:
                  pass
          files_section = "\n".join(f'<file path="{p}">\n{c}\n</file>' for p, c in repo_files.items())
          prompt = ("You are a senior software engineer.\n" "Analyze the GitHub Issue and modify the repository code.\n" "Respond ONLY with a JSON object (no markdown, no backticks):\n" "{\n" '  "analysis": "brief analysis",\n' '  "changes": [\n' "    {\n" '      "path": "file path",\n' '      "action": "modify or create or delete",\n' '      "content": "full file content",\n' '      "reason": "reason"\n' "    }\n" "  ],\n" '  "summary": "one line summary for commit message"\n' "}\n\n" f"Issue #{issue_number}\n" f"Title: {issue_title}\n" f"Body:\n{issue_body}\n\n" f"Repository files:\n{files_section}")
          print(f"Calling Groq API for issue #{issue_number}...")
          response = client.chat.completions.create(model="llama-3.3-70b-versatile", messages=[{"role": "user", "content": prompt}], max_tokens=8000, temperature=0.1)
          raw = response.choices[0].message.content.strip()
          if raw.startswith("```"):
              raw = "\n".join(raw.split("\n")[1:])
          if raw.endswith("```"):
              raw = "\n".join(raw.split("\n")[:-1])
          raw = raw.strip()
          result = json.loads(raw)
          for change in result.get("changes", []):
              path = change["path"].lstrip("./")
              action = change["action"]
              content = change.get("content", "")
              if action == "delete":
                  if os.path.exists(path):
                      os.remove(path)
                      print(f"Deleted: {path}")
              else:
                  parent = os.path.dirname(path)
                  if parent:
                      os.makedirs(parent, exist_ok=True)
                  with open(path, "w", encoding="utf-8") as fh:
                      fh.write(content)
                  print(f"{action}: {path}")
          summary = result.get("summary", "AI code update")
          analysis = result.get("analysis", "")
          with open(os.environ["GITHUB_ENV"], "a") as ef:
              ef.write(f"COMMIT_MSG={summary}\n")
              ef.write(f"CLAUDE_ANALYSIS<<EOF\n{analysis}\nEOF\n")
          with open("/tmp/changes.json", "w") as cf:
              json.dump(result.get("changes", []), cf, ensure_ascii=False)
          print(f"Done: {summary}")
          PYEOF
          python3 /tmp/agent.py
      - name: Commit and push
        run: |
          git config user.name "Groq Code Agent"
          git config user.email "groq-agent@noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            git commit -m "🤖 [Issue #${{ github.event.issue.number }}] ${{ env.COMMIT_MSG }}"
            git push origin HEAD
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi
      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const hasChanges = process.env.HAS_CHANGES === 'true';
            const analysis = process.env.CLAUDE_ANALYSIS || '';
            const commitMsg = process.env.COMMIT_MSG || '';
            const sha = context.sha;
            let changesTable = '';
            try {
              const changes = JSON.parse(fs.readFileSync('/tmp/changes.json', 'utf8'));
              const rows = changes.map(c => {
                const icon = c.action === 'modify' ? 'Modify' : c.action === 'create' ? 'Create' : 'Delete';
                return `| \`${c.path}\` | ${icon} | ${c.reason} |`;
              }).join('\n');
              changesTable = `\n| File | Action | Reason |\n|------|--------|--------|\n${rows}`;
            } catch(e) {}
            const body = hasChanges
              ? `## 🤖 Groq Code Agent Complete\n\n**Analysis**\n${analysis}\n\n**Changed Files**${changesTable}\n\n**Commit**: \`${sha.substring(0,7)}\` — ${commitMsg}\n\n> Code has been automatically modified and pushed.`
              : `## 🤖 Groq Code Agent\n\n**Analysis**\n${analysis}\n\n> No code changes were necessary.`;
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body});
            try {
              await github.rest.issues.addLabels({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels: ['ai-done']});
            } catch(e) {}
