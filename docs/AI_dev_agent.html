<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>AI Code Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet"></noscript>
  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --border:   #1e1e2e;
      --accent:   #7c6af7;
      --accent2:  #c084fc;
      --green:    #22d3a0;
      --red:      #f87171;
      --text:     #e2e2f0;
      --muted:    #6b6b8a;
      --mono:     'JetBrains Mono', 'Courier New', monospace;
      --sans:     'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 10%, rgba(124,106,247,.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 10% 80%, rgba(192,132,252,.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 28px 20px 0;
      text-align: center;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid; place-items: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(124,106,247,.4);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 20px rgba(124,106,247,.4); }
      50%      { box-shadow: 0 0 32px rgba(192,132,252,.6); }
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.05em;
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      padding: 20px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      transition: border-color .2s;
    }

    .card:focus-within { border-color: rgba(124,106,247,.5); }

    .field-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .field-label .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .field-label .dot.green { background: var(--green); }

    /* ── 레포 입력 + 드롭다운 ── */
    .repo-dropdown {
      display: none;
      flex-direction: column;
      margin-top: 6px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
    }

    .repo-dropdown.show { display: flex; }

    .repo-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 12px;
      cursor: pointer;
      transition: background .12s;
      -webkit-tap-highlight-color: transparent;
      border-bottom: 1px solid var(--border);
    }

    .repo-item:last-child { border-bottom: none; }

    .repo-item:active,
    .repo-item.selected { background: rgba(124,106,247,.12); }

    .repo-item-check {
      font-size: 12px;
      color: var(--accent);
      flex-shrink: 0;
      width: 14px;
    }

    .repo-item-name {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .repo-item.selected .repo-item-name { color: var(--accent2); }

    .repo-item-del {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
      line-height: 1;
      transition: color .15s;
      -webkit-tap-highlight-color: transparent;
    }

    .repo-item-del:active { color: var(--red); }

    .repo-empty-msg {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 12px;
    }

    /* ── 입력 필드 ── */
    .token-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color .2s, background .2s;
      -webkit-appearance: none;
    }

    input:focus {
      border-color: var(--accent);
      background: rgba(124,106,247,.05);
    }

    .eye-btn {
      background: var(--border);
      border: none;
      border-radius: 8px;
      width: 42px; height: 42px;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      display: grid; place-items: center;
      transition: background .2s, color .2s;
    }

    .eye-btn:hover { background: #2a2a3e; color: var(--text); }

    #title {
      font-size: 15px;
      font-family: var(--sans);
      font-weight: 400;
      padding: 12px 14px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 12px;
    }

    .chip {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .chip:hover, .chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(124,106,247,.08);
    }

    textarea {
      width: 100%;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      outline: none;
      min-height: 130px;
      transition: border-color .2s, background .2s;
      -webkit-appearance: none;
    }

    textarea:focus {
      border-color: var(--accent);
      background: rgba(124,106,247,.05);
    }

    .char-count {
      text-align: right;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .label-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-switch {
      position: relative;
      width: 44px; height: 24px;
      flex-shrink: 0;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: background .2s;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--muted);
      top: 3px; left: 3px;
      transition: transform .2s, background .2s;
    }

    .toggle-switch input:checked + .toggle-track { background: rgba(124,106,247,.3); }
    .toggle-switch input:checked + .toggle-track::after {
      transform: translateX(20px);
      background: var(--accent);
    }

    .toggle-desc {
      font-size: 12px;
      color: var(--muted);
      max-width: 75%;
      line-height: 1.4;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(124,106,247,.35);
      transition: transform .15s;
      -webkit-tap-highlight-color: transparent;
    }

    .submit-btn:active { transform: scale(.98); }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .submit-btn .btn-text { position: relative; z-index: 1; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      font-family: var(--mono);
      font-size: 13px;
      z-index: 100;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0;
      max-width: calc(100vw - 32px);
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(34,211,160,.4); color: var(--green); }
    .toast.error   { border-color: rgba(248,113,113,.4); color: var(--red); }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }

    .loading .spinner { display: block; }
    .loading .btn-text { display: none; }

    .success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      padding: 40px 24px;
      text-align: center;
    }

    .success-screen.show { display: flex; }
    main.done { display: none; }

    .check-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(34,211,160,.12);
      border: 2px solid var(--green);
      display: grid; place-items: center;
      font-size: 32px;
      animation: pop .4s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

    .success-title {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
    }

    .success-desc { font-size: 14px; color: var(--muted); line-height: 1.6; }

    .issue-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 10px;
      border: 1px solid rgba(124,106,247,.4);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 13px;
      text-decoration: none;
      transition: background .2s;
    }
    .issue-link:hover { background: rgba(124,106,247,.08); }

    .reset-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      padding: 8px;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .info-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,106,247,.08);
      border: 1px solid rgba(124,106,247,.2);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    .info-badge strong { color: var(--accent2); }

    /* ── 모드 토글 ── */
    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .mode-btn {
      padding: 10px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,.02);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-btn.active {
      border-color: var(--accent);
      background: rgba(124,106,247,.1);
      color: var(--accent2);
      box-shadow: 0 0 0 1px rgba(124,106,247,.25);
    }

    .revert-hint {
      display: none;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      background: rgba(248,113,113,.08);
      border: 1px solid rgba(248,113,113,.2);
      border-radius: 8px;
      padding: 7px 10px;
      margin-bottom: 10px;
    }

    .revert-hint.show { display: block; }

    .title-wrap {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color .2s, background .2s;
      overflow: hidden;
    }

    .title-wrap:focus-within {
      border-color: var(--accent);
      background: rgba(124,106,247,.05);
    }

    .title-prefix {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--red);
      font-weight: 600;
      padding: 12px 0 12px 14px;
      white-space: nowrap;
      flex-shrink: 0;
      user-select: none;
    }

    .title-wrap #title {
      border: none;
      background: transparent;
      border-radius: 0;
      padding-left: 4px;
      flex: 1;
      min-width: 0;
    }

    .title-wrap #title:focus {
      border-color: transparent;
      background: transparent;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-wrap">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">AI Code Agent</span>
    </div>
    <p class="subtitle">Issue → 자동 코드 수정 시스템</p>
  </header>

  <main id="form-main">

    <!-- 프로젝트 선택 -->
    <div class="card">
      <div class="field-label"><span class="dot"></span>프로젝트 선택</div>
      <input type="text" id="repo-input" placeholder="owner/repo-name" autocapitalize="none" spellcheck="false" autocorrect="off" oninput="onRepoInput()" onfocus="showRepoDropdown()" />
      <div class="repo-dropdown" id="repo-dropdown"></div>
    </div>

    <!-- PAT -->
    <div class="card">
      <div class="field-label"><span class="dot green"></span>Personal Access Token</div>
      <div class="token-row">
        <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocapitalize="none" spellcheck="false" />
        <button class="eye-btn" id="eye-btn" onclick="togglePwd()">👁</button>
      </div>
      <div style="margin-top:10px">
        <label class="label-toggle">
          <span class="toggle-desc">토큰을 이 기기에 저장<br><small>(다음 방문 시 자동 입력)</small></span>
          <label class="toggle-switch">
            <input type="checkbox" id="save-token" checked />
            <span class="toggle-track"></span>
          </label>
        </label>
      </div>
    </div>

    <!-- 이슈 제목 -->
    <div class="card">
      <div class="field-label"><span class="dot"></span>이슈 제목</div>
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-task" onclick="setMode('task')">⚡ 작업요청</button>
        <button class="mode-btn" id="mode-revert" onclick="setMode('revert')">↩ 되돌리기</button>
      </div>
      <div class="revert-hint" id="revert-hint">커밋 해시 7자리를 입력하세요 (예: 5d96b9b)</div>
      <div class="title-wrap" id="title-wrap">
        <span class="title-prefix" id="title-prefix"></span>
        <input type="text" id="title" placeholder="[AI] 수정 내용을 입력하세요" oninput="onTitleInput(event)" onkeydown="onTitleKeydown(event)" />
      </div>
    </div>

    <!-- 이슈 본문 -->
    <div class="card">
      <div class="field-label"><span class="dot"></span>상세 지시사항</div>
      <textarea id="body" placeholder="어떤 코드를 어떻게 수정할지 구체적으로 설명해주세요.

예시:
- 로그인 API에서 JWT 토큰 만료 시간을 7일로 변경해주세요.
- 단어 체인 게임에서 중복 단어 입력 시 오류 메시지를 추가해주세요." oninput="updateCount()"></textarea>
      <div class="char-count"><span id="char-count">0</span> 자</div>
    </div>

    <!-- 라벨 토글 -->
    <div class="card">
      <label class="label-toggle">
        <span class="toggle-desc">'ai' 라벨 자동 추가<br><small>켜짐: 이슈 등록 즉시 AI가 코드를 자동 수정합니다.<br>꺼짐: 이슈만 등록되며, 나중에 github issues 항목에서 수동으로 'ai' 라벨을 추가해 실행할 수 있습니다.</small></span>
        <label class="toggle-switch">
          <input type="checkbox" id="add-label" checked />
          <span class="toggle-track"></span>
        </label>
      </label>
    </div>

    <div class="info-badge">
      ⚡ 이슈 등록 후 약 <strong>1~3분</strong> 내에 AI가 코드를 수정하고 Push합니다
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitIssue()">
      <div class="spinner"></div>
      <span class="btn-text">⚡ 이슈 등록 · 자동 수정 시작</span>
    </button>

  </main>

  <!-- 완료 화면 -->
  <div class="success-screen" id="success-screen">
    <div class="check-circle">✓</div>
    <div class="success-title">이슈 등록 완료!</div>
    <div class="success-desc" id="success-desc">
      AI가 레포지토리를 분석하고<br>자동으로 코드를 수정합니다.<br>
      <small style="color:var(--muted);font-size:12px;">GitHub Actions에서 진행 상황을 확인하세요.</small>
    </div>
    <a id="issue-link" class="issue-link" href="#" target="_blank">🔗 이슈 확인하기</a>
    <a id="actions-link" class="issue-link" href="#" target="_blank">⚙️ Actions 보기</a>
    <button class="reset-btn" onclick="resetForm()">↩ 새 이슈 등록</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── 레포 관리 ──
    const REPO_KEY = 'gh_repos';
    const REPO_SEL_KEY = 'gh_repo_selected';
    let selectedRepo = '';

    function loadRepos() {
      try { return JSON.parse(localStorage.getItem(REPO_KEY) || '[]'); }
      catch { return []; }
    }

    function saveRepos(list) {
      localStorage.setItem(REPO_KEY, JSON.stringify(list));
    }

    function getSelectedRepo() {
      // 입력창에 직접 입력된 값 우선, 없으면 선택된 값
      const inp = document.getElementById('repo-input').value.trim();
      return inp || selectedRepo;
    }

    function renderRepoDropdown(filter) {
      const list = loadRepos();
      const dropdown = document.getElementById('repo-dropdown');
      dropdown.innerHTML = '';

      const filtered = filter
        ? list.filter(r => r.toLowerCase().includes(filter.toLowerCase()))
        : list;

      if (filtered.length === 0) {
        dropdown.innerHTML = `<div class="repo-empty-msg">${filter ? '일치하는 레포 없음' : '저장된 레포가 없습니다'}</div>`;
        dropdown.classList.add('show');
        return;
      }

      filtered.forEach(repo => {
        const item = document.createElement('div');
        item.className = 'repo-item' + (repo === selectedRepo ? ' selected' : '');
        item.innerHTML = `
          <span class="repo-item-check">${repo === selectedRepo ? '✓' : ''}</span>
          <span class="repo-item-name">${repo}</span>
          <button class="repo-item-del" onclick="deleteRepo(event,'${repo}')">×</button>`;
        item.addEventListener('click', () => {
          selectRepo(repo);
          document.getElementById('repo-input').value = repo;
          hideRepoDropdown();
        });
        dropdown.appendChild(item);
      });

      dropdown.classList.add('show');
    }

    function showRepoDropdown() {
      const list = loadRepos();
      if (list.length === 0) return;
      const filter = document.getElementById('repo-input').value.trim();
      renderRepoDropdown(filter);
    }

    function hideRepoDropdown() {
      document.getElementById('repo-dropdown').classList.remove('show');
    }

    function onRepoInput() {
      const val = document.getElementById('repo-input').value.trim();
      renderRepoDropdown(val);
    }

    function selectRepo(repo) {
      selectedRepo = repo;
      localStorage.setItem(REPO_SEL_KEY, repo);
    }

    function saveRepoFromInput(repo) {
      // 이슈 등록 시 호출 - 목록 맨 앞에 추가 (최근 사용순)
      let list = loadRepos().filter(r => r !== repo);
      list.unshift(repo);
      saveRepos(list);
      selectRepo(repo);
    }

    function deleteRepo(e, repo) {
      e.stopPropagation();
      const list = loadRepos().filter(r => r !== repo);
      saveRepos(list);
      if (selectedRepo === repo) {
        selectedRepo = list[0] || '';
        localStorage.setItem(REPO_SEL_KEY, selectedRepo);
      }
      renderRepoDropdown(document.getElementById('repo-input').value.trim());
    }

    // 드롭다운 외부 클릭 시 닫기
    document.addEventListener('click', e => {
      const card = document.getElementById('repo-input').closest('.card');
      if (!card.contains(e.target)) hideRepoDropdown();
    });

    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('gh_token');
      if (saved) document.getElementById('token').value = saved;

      // 마지막 사용 레포 자동 입력
      const lastRepo = localStorage.getItem(REPO_SEL_KEY) || loadRepos()[0] || '';
      if (lastRepo) {
        selectedRepo = lastRepo;
        document.getElementById('repo-input').value = lastRepo;
      }
    });

    function togglePwd() {
      const inp = document.getElementById('token');
      const btn = document.getElementById('eye-btn');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    function updateCount() {
      document.getElementById('char-count').textContent =
        document.getElementById('body').value.length;
    }

    // ── 모드 관리 ──
    let currentMode = 'task'; // 'task' | 'revert'
    const REVERT_PREFIX = 'REVERT: ';

    function setMode(mode) {
      currentMode = mode;
      const titleInp = document.getElementById('title');
      const prefix   = document.getElementById('title-prefix');
      const hint     = document.getElementById('revert-hint');
      const btnTask   = document.getElementById('mode-task');
      const btnRevert = document.getElementById('mode-revert');

      if (mode === 'revert') {
        btnTask.classList.remove('active');
        btnRevert.classList.add('active');
        prefix.textContent = REVERT_PREFIX;
        hint.classList.add('show');
        titleInp.value = '';
        titleInp.placeholder = '5d96b9b 등의 revert할 commit hash 입력';
        titleInp.focus();
      } else {
        btnTask.classList.add('active');
        btnRevert.classList.remove('active');
        prefix.textContent = '';
        hint.classList.remove('show');
        titleInp.value = '';
        titleInp.placeholder = '[AI] 수정 내용을 입력하세요';
        titleInp.focus();
      }
    }

    // 되돌리기 모드: 커서가 prefix 앞으로 가지 않도록
    function onTitleKeydown(e) {
      if (currentMode !== 'revert') return;
      // 백스페이스로 빈 상태에서 더 지우려 하면 차단
      if (e.key === 'Backspace' && document.getElementById('title').value === '') {
        e.preventDefault();
      }
    }

    function onTitleInput(e) {
      if (currentMode !== 'revert') return;
      // 혹시 prefix가 포함된 채로 붙여넣기 되는 경우 제거
      const inp = document.getElementById('title');
      if (inp.value.startsWith(REVERT_PREFIX)) {
        inp.value = inp.value.slice(REVERT_PREFIX.length);
      }
    }

    let toastTimer;
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = (type === 'success' ? '✓ ' : '✗ ') + msg;
      t.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
    }

    async function submitIssue() {
      const repo   = getSelectedRepo();
      const token  = document.getElementById('token').value.trim();
      const rawTitle = document.getElementById('title').value.trim();
      const body   = document.getElementById('body').value.trim();
      const addLbl = document.getElementById('add-label').checked;
      const saveT  = document.getElementById('save-token').checked;

      if (!repo) return showToast('레포를 입력하세요.', 'error');
      if (!repo.includes('/')) return showToast('owner/repo 형식으로 입력하세요.', 'error');
      if (!token) return showToast('GitHub Personal Access Token을 입력하세요.', 'error');
      if (!rawTitle) return showToast('이슈 제목을 입력하세요.', 'error');

      let title;
      if (currentMode === 'revert') {
        if (body.length < 1 && document.getElementById('body').value.trim() === '') {
          // 되돌리기 모드는 본문 없어도 허용, 단 해시 길이 체크
        }
        title = REVERT_PREFIX + rawTitle;
        if (rawTitle.length < 5) return showToast('커밋 해시를 입력하세요.', 'error');
      } else {
        if (body.length < 10) return showToast('상세 지시사항을 10자 이상 입력하세요.', 'error');
        title = rawTitle.startsWith('[AI]') ? rawTitle : '[AI] ' + rawTitle;
      }

      if (saveT) localStorage.setItem('gh_token', token);
      saveRepoFromInput(repo); // 이슈 등록 성공 시 레포 저장 (최근 사용순)

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.classList.add('loading');

      try {
        if (addLbl) {
          await fetch(`https://api.github.com/repos/${repo}/labels`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json',
              'Accept': 'application/vnd.github+json'
            },
            body: JSON.stringify({ name: 'ai', color: '7c6af7', description: 'AI Code Agent 자동 처리' })
          });
        }

        const issueBody = currentMode === 'revert'
          ? `커밋 ${rawTitle} 을 되돌립니다.\n\nREVERT: ${rawTitle}`
          : body;

        const res = await fetch(`https://api.github.com/repos/${repo}/issues`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
            'Accept': 'application/vnd.github+json'
          },
          body: JSON.stringify({ title, body: issueBody, labels: addLbl ? ['ai'] : [] })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.message || `HTTP ${res.status}`);
        }

        const issue = await res.json();
        const repoName = repo.split('/')[1];

        document.getElementById('success-desc').innerHTML =
          `<strong style="color:var(--accent2)">${repoName}</strong> 레포지토리를<br>AI가 분석하고 자동으로 수정합니다.<br>
          <small style="color:var(--muted);font-size:12px;">GitHub Actions에서 진행 상황을 확인하세요.</small>`;
        document.getElementById('issue-link').href = issue.html_url;
        document.getElementById('actions-link').href = `https://github.com/${repo}/actions`;
        document.getElementById('form-main').classList.add('done');
        document.getElementById('success-screen').classList.add('show');

      } catch (e) {
        showToast(e.message || '이슈 등록에 실패했습니다.', 'error');
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    function resetForm() {
      currentMode = 'task';
      document.getElementById('title').value = '';
      document.getElementById('title-prefix').textContent = '';
      document.getElementById('title').placeholder = '[AI] 수정 내용을 입력하세요';
      document.getElementById('revert-hint').classList.remove('show');
      document.getElementById('mode-task').classList.add('active');
      document.getElementById('mode-revert').classList.remove('active');
      document.getElementById('body').value  = '';
      document.getElementById('char-count').textContent = '0';
      document.getElementById('form-main').classList.remove('done');
      document.getElementById('success-screen').classList.remove('show');
      const btn = document.getElementById('submit-btn');
      btn.disabled = false;
      btn.classList.remove('loading');
      // 레포 선택은 유지
      renderRepoList();
    }
  </script>
</body>
</html>
